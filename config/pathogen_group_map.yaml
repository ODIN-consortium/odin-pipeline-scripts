# ODIN Pathogen Group Map
# Replaces "pathogens for database.xlsx" (sheet: comprehensive_pathogen_list).
# Used by create_kraken_datasets.py to assign pathogen groups to Kraken2 output.
#
# Fields per entry:
#   taxid:           NCBI Taxonomy ID (integer, required)
#   scientific_name: Scientific name (for reference / documentation)
#   type:            bacteria | virus | eukaryotic
#   target_group:    AMR | waterborne | non-waterborne
#   priority:        WP2-priority  (omit if not applicable)
#   pathogen_group:  Group label used in analysis outputs (required)
#
# NOTE: Group names containing a trailing zero-width space (\u200b) are written
# using YAML double-quoted Unicode escapes to keep the file visually clean while
# preserving the exact characters that appear in published analysis outputs.
#
# NOTE: "Cryptosporidium " has a deliberate trailing space — do not remove it.
#
# Salmonella is plotted as a single group (per SME consensus, June 2026):
#   Salmonella spp. (AMR) - TaxID 28901 — total S. enterica clade count; includes all
#                           serovars (Typhi, Typhimurium, etc.).
#
# PRESERVED FOR FUTURE USE — two-tier approach was previously implemented but removed:
#   reclassify_salmonella() in create_kraken_datasets.py can split out
#   TaxID 90370 (Typhi) and TaxID 90371 (Typhimurium) if serovar-level reporting
#   is needed in future. Re-enable by adding the TaxID 90370 entry below and
#   calling reclassify_salmonella() in main().
#
# NOTE: Subspecies TaxIDs (59202, 59204, 59205, 59207, 218493) are intentionally absent
# from this display list — their reads are already captured inside TaxID 28901's clade count.
# They may still be present in the Kraken2 database for classification accuracy.
# TaxID 590 (Salmonella genus) is also absent — it caused LCA-collapse artefacts.
# TaxID 54736 (S. bongori) is absent — rare, and S. enterica covers the clinically
# relevant Salmonella burden.

pathogens:

  # ── AMR bacteria ──────────────────────────────────────────────────────────

  - taxid: 562
    scientific_name: "Escherichia coli"
    type: bacteria
    target_group: AMR
    priority: WP2-priority
    pathogen_group: "ESBL/Carbapenemase producing E. coli\u200b"

  - taxid: 573
    scientific_name: "Klebsiella pneumoniae"
