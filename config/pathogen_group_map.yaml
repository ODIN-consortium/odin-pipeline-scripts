    type: bacteria
    target_group: AMR
    pathogen_group: "ESBL/Carbapenemase producing Enterobacter species\u200b"

  - taxid: 1352
    scientific_name: "Enterococcus faecium"
    type: bacteria
    target_group: AMR
    pathogen_group: "Vancomycin resistant E. faecium\u200b"

  - taxid: 287
    scientific_name: "Pseudomonas aeruginosa"
    type: bacteria
    target_group: AMR
    pathogen_group: "CARBA- P. aeruginosa"

  - taxid: 470
    scientific_name: "Acinetobacter baumannii"
    type: bacteria
    target_group: AMR
    pathogen_group: "CARBA- A. baumannii"

  - taxid: 498019
    scientific_name: "Candidozyma auris"
    type: eukaryotic
    target_group: AMR
    pathogen_group: "AMR Candida auris"

  # Total S. enterica clade — all Salmonella spp. including Typhi and Typhimurium.
  # Clade count (No of Frags root) captures all descendants, so all serovars are included.
  - taxid: 28901
    scientific_name: "Salmonella enterica"
    type: bacteria
    target_group: AMR
    pathogen_group: "Salmonella spp."

